# cargo-deny configuration for Logos.
# Checks licenses, security advisories, and dependency quality.
# Run locally: cargo deny check all

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# Deny crates with known vulnerabilities by default.
yanked = "deny"
# Several transitive dependencies (heapless via postcard, uniffi via bincode/paste)
# are flagged as unmaintained but have no safe upgrade path within the current
# dependency tree. They are tracked here; replace when upstream fixes land.
ignore = [
    "RUSTSEC-2023-0089", # atomic-polyfill (via heapless -> postcard)
    "RUSTSEC-2024-0436", # paste (via uniffi)
    "RUSTSEC-2025-0141", # bincode v1 (via uniffi)
]

[licenses]
# Logos itself is AGPL-3.0-only. Allow only licenses compatible with that
# and common in the Rust ecosystem.
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
# ring is licensed under a custom ISC-like license; cargo-deny needs help here.
name = "ring"
version = "*"
expression = "ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

[bans]
# Wildcard requirements make builds non-reproducible.
wildcards = "warn"
allow-wildcard-paths = true
# Multiple versions of the same crate complicate auditing.
multiple-versions = "warn"
multiple-versions-include-dev = false
highlight = "all"
skip = []
skip-tree = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
