name: LogosApp
options:
  bundleIdPrefix: com.colecantcode
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  LogosKit:
    path: ../LogosKit
targets:
  LogosApp:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: LogosKit
        product: LogosKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.logos
        PRODUCT_NAME: Logos
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        # Signing: cloud-managed automatic signing via the App Store Connect API
        # key in CI (no Mac, nothing to export). The workflow passes/overrides
        # DEVELOPMENT_TEAM; this default matches the team baked into the workflow.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B3DB33R8JN
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        # Export compliance: Logos uses custom E2EE (NOT exempt). We self-declare `false`
        # here so altool can upload to TestFlight — setting `true` requires a matching
        # ITSEncryptionExportComplianceCode that App Store Connect only issues AFTER you
        # complete the export-compliance questionnaire, so `true` with no code is rejected
        # at upload (Validation 409, Invalid Export Compliance Code).
        # BEFORE ACTUAL APP STORE SUBMISSION: (1) file the one-time + annual BIS/NSA self-
        # classification (crypt@bis.doc.gov + enc@nsa.gov) declaring mass-market 5D992.c;
        # (2) complete the ASC export questionnaire to get the compliance code; then
        # (3) set this to `true` AND add INFOPLIST_KEY_ITSEncryptionExportComplianceCode:
        # <code>. See docs/CI_TESTFLIGHT_SETUP.md.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSCameraUsageDescription: "Logos uses the camera only to scan a contact’s QR code — to add them or verify their safety number. Nothing is recorded."
        INFOPLIST_KEY_CFBundleDisplayName: Logos
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    scheme:
      testTargets: []
