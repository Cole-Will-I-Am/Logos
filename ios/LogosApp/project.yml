name: LogosApp
options:
  bundleIdPrefix: com.colecantcode
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  LogosKit:
    path: ../LogosKit
targets:
  LogosApp:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: LogosKit
        product: LogosKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.logos
        PRODUCT_NAME: Logos
        MARKETING_VERSION: "0.1.23"
        CURRENT_PROJECT_VERSION: 1
        # Signing: cloud-managed automatic signing via the App Store Connect API
        # key in CI (no Mac, nothing to export). The workflow passes/overrides
        # DEVELOPMENT_TEAM; this default matches the team baked into the workflow.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B3DB33R8JN
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        # Export compliance: this beta declares no non-exempt encryption so the
        # TestFlight upload isn't gated on the compliance questionnaire. NOTE:
        # Logos does use custom E2EE — revisit with a proper self-classification
        # before any public App Store release (see docs/CI_TESTFLIGHT_SETUP.md).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSCameraUsageDescription: "Logos uses the camera only to scan a contact’s QR code — to add them or verify their safety number. Nothing is recorded."
        INFOPLIST_KEY_CFBundleDisplayName: Logos
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    scheme:
      testTargets: []
